<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestaCoin Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            
            /* --- FOND D'ÉCRAN MOSAÏQUE --- */
            background-image: url('keypred.JPG'); 
            background-size: 1.5cm 1.5cm;
            background-repeat: repeat;
            background-color: #1a1a1a; 
        }

        /* --- STYLE DU LOGO --- */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-logo {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.5));
        }
        
        .add-player-section {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            gap: 10px;
        }
        
        input[type="text"] {
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            flex-grow: 1;
        }
        
        .btn-add {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #f39c12, #d35400);
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        
        .btn-add:active {
            transform: scale(0.95);
        }
        
        .player-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            border: 2px solid #d4af37;
        }
        
        .player-name {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .score-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .score {
            font-size: 22px;
            font-weight: 900;
            min-width: 40px;
            text-align: center;
            color: #d4af37;
            text-shadow: 1px 1px 0px #000;
        }
        
        .control-btn {
            width: 40px;
            height: 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0px rgba(0,0,0,0.2);
        }

        .btn-minus { background-color: #e74c3c; }
        .btn-minus:active { transform: translateY(2px); box-shadow: none; }

        .btn-plus { background-color: #27ae60; }
        .btn-plus:active { transform: translateY(2px); box-shadow: none; }

        /* --- STYLE DU BOUTON RESET --- */
        .reset-section {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-reset {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #c0392b;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s;
        }

        .btn-reset:hover {
            background-color: #a53125;
        }

    </style>
</head>
<body>

    <div class="logo-container">
        <a href="fullcoin.png"><img src="logo.png" alt="NestaCoin Logo" class="main-logo"></a>
    </div>

    <div class="add-player-section">
        <input type="text" id="playerNameInput" placeholder="Nom du parieur / joueur..." onkeypress="handleKeyPress(event)">
        <button class="btn-add" onclick="addPlayer()">AJOUTER</button>
    </div>

    <div id="playersContainer">
        </div>

    <div class="reset-section">
        <button class="btn-reset" onclick="resetGame()">🔄 Réinitialiser la partie</button>
    </div>

    <script>
        // Tableau qui contient l'état du jeu
        let playersData = [];

        // Au chargement de la page, on récupère les données sauvegardées
        window.onload = function() {
            loadState();
        };

        // Charger les données depuis le localStorage (équivalent cookie)
        function loadState() {
            const savedData = localStorage.getItem('nestaCoinState');
            if (savedData) {
                playersData = JSON.parse(savedData);
                renderPlayers();
            }
        }

        // Sauvegarder les données dans le navigateur
        function saveState() {
            localStorage.setItem('nestaCoinState', JSON.stringify(playersData));
        }

        // Ajouter un joueur
        function addPlayer() {
            const input = document.getElementById('playerNameInput');
            const playerName = input.value.trim();

            if (playerName === "") return;

            // Ajoute le joueur au début du tableau
            playersData.unshift({ name: playerName, score: 0 });
            
            saveState(); // On sauvegarde
            renderPlayers(); // On met à jour l'affichage

            input.value = "";
            input.focus();
        }

        // Modifier le score
        function updateScore(index, change) {
            playersData[index].score += change;
            saveState(); // On sauvegarde à chaque modification
            renderPlayers(); // On met à jour l'affichage
        }

        // Réinitialiser la partie
        function resetGame() {
            if (confirm("🚨 Es-tu sûr de vouloir effacer tous les joueurs et les scores ?")) {
                playersData = []; // On vide le tableau
                saveState(); // On sauvegarde le tableau vide
                renderPlayers(); // On vide l'affichage
            }
        }

        // Afficher tous les joueurs en lisant le tableau de données
        function renderPlayers() {
            const container = document.getElementById('playersContainer');
            container.innerHTML = ''; // On vide le conteneur avant de tout redessiner

            playersData.forEach((player, index) => {
                const playerCard = document.createElement('div');
                playerCard.className = 'player-card';

                const nameDiv = document.createElement('div');
                nameDiv.className = 'player-name';
                nameDiv.textContent = player.name;

                const scoreSection = document.createElement('div');
                scoreSection.className = 'score-section';

                const btnMinus = document.createElement('button');
                btnMinus.className = 'control-btn btn-minus';
                btnMinus.textContent = '-';
                btnMinus.onclick = function() { updateScore(index, -1); };

                const scoreDisplay = document.createElement('div');
                scoreDisplay.className = 'score';
                scoreDisplay.textContent = player.score;

                const btnPlus = document.createElement('button');
                btnPlus.className = 'control-btn btn-plus';
                btnPlus.textContent = '+';
                btnPlus.onclick = function() { updateScore(index, 1); };

                scoreSection.appendChild(btnMinus);
                scoreSection.appendChild(scoreDisplay);
                scoreSection.appendChild(btnPlus);
                playerCard.appendChild(nameDiv);
                playerCard.appendChild(scoreSection);

                container.appendChild(playerCard);
            });
        }

        // Valider avec la touche Entrée
        function handleKeyPress(event) {
            if (event.key === 'Enter') addPlayer();
        }
    </script>
</body>
</html>
